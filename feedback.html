<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stipum — Pilot Feedback</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 64px 20px 80px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    .header {
      margin-bottom: 44px;
    }

    .header p {
      font-size: 15px;
      line-height: 1.6;
      color: #444;
    }

    .header p + p {
      margin-top: 6px;
      color: #888;
      font-size: 14px;
    }

    .question {
      margin-bottom: 36px;
    }

    .question-label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      color: #111;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    .optional-tag {
      font-size: 13px;
      font-weight: 400;
      color: #999;
      margin-left: 6px;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid #E5E5E5;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .radio-option:hover {
      border-color: #bbb;
      background: #FAFAFA;
    }

    .radio-option input[type="radio"] {
      width: 16px;
      height: 16px;
      accent-color: #0A2540;
      cursor: pointer;
      flex-shrink: 0;
    }

    .radio-option.selected {
      border-color: #0A2540;
      background: #F5F7FA;
    }

    .radio-option span {
      font-size: 14px;
      color: #222;
      line-height: 1.4;
    }

    textarea, input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #E5E5E5;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.65;
      color: #111;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea {
      resize: vertical;
    }

    textarea:focus, input[type="text"]:focus { border-color: #0A2540; }
    textarea::placeholder, input[type="text"]::placeholder { color: #bbb; }

    .other-input {
      margin-top: 10px;
      display: none;
    }

    .other-input.visible {
      display: block;
    }

    .submit-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #0A2540;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      margin-top: 8px;
    }

    .submit-btn:hover:not(:disabled) { background: #0d2f50; }

    .submit-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .success {
      display: none;
      padding: 64px 0;
    }

    .success p {
      font-size: 18px;
      font-weight: 600;
      color: #111;
    }

    .divider {
      border: none;
      border-top: 1px solid #F0F0F0;
      margin-bottom: 36px;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <p>You recently completed a Stipum filing.</p>
    <p>A few quick questions — takes about two minutes.</p>
  </div>

  <form id="feedback-form">

    <!-- Q1 -->
    <div class="question">
      <label class="question-label">Did the filing complete successfully?</label>
      <div class="radio-group" id="q1-group">
        <label class="radio-option">
          <input type="radio" name="q1" value="Yes — both parties completed and the record locked" onchange="onRadioChange(this, 'q1-group')">
          <span>Yes — both parties completed and the record locked</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="q1" value="No — the other party did not complete" onchange="onRadioChange(this, 'q1-group')">
          <span>No — the other party did not complete</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="q1" value="Partially — we completed but did not lock" onchange="onRadioChange(this, 'q1-group')">
          <span>Partially — we completed but did not lock</span>
        </label>
      </div>
    </div>

    <hr class="divider">

    <!-- Q2 -->
    <div class="question">
      <label class="question-label" for="q2">When you saw the side-by-side comparison, what did you notice?</label>
      <textarea id="q2" name="q2" rows="4" placeholder="Describe what you saw — gaps, surprises, alignment..." oninput="checkRequired()"></textarea>
    </div>

    <hr class="divider">

    <!-- Q3 -->
    <div class="question">
      <label class="question-label">What happened after you saw the comparison?</label>
      <div class="radio-group" id="q3-group">
        <label class="radio-option">
          <input type="radio" name="q3" value="We discussed the differences before locking" onchange="onRadioChange(this, 'q3-group')">
          <span>We discussed the differences before locking</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="q3" value="We locked without discussion" onchange="onRadioChange(this, 'q3-group')">
          <span>We locked without discussion</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="q3" value="We decided not to lock" onchange="onRadioChange(this, 'q3-group')">
          <span>We decided not to lock</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="q3" value="Other" onchange="onRadioChange(this, 'q3-group'); toggleOther(this)">
          <span>Other</span>
        </label>
      </div>
      <div class="other-input" id="q3-other-wrap">
        <input type="text" id="q3_other_text" name="q3_other_text" placeholder="Please describe..." oninput="checkRequired()">
      </div>
    </div>

    <hr class="divider">

    <!-- Q4 -->
    <div class="question">
      <label class="question-label" for="q4">Did anything in the filing feel confusing, missing, or wrong? <span class="optional-tag">(optional)</span></label>
      <textarea id="q4" name="q4" rows="3" placeholder="If yes, describe it briefly. If no, leave blank."></textarea>
    </div>

    <hr class="divider">

    <!-- Q5 -->
    <div class="question">
      <label class="question-label">Would you file a Stipum declaration on another job?</label>
      <div class="radio-group" id="q5-group">
        <label class="radio-option">
          <input type="radio" name="q5" value="Yes, definitely" onchange="onRadioChange(this, 'q5-group')">
          <span>Yes, definitely</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="q5" value="Probably yes" onchange="onRadioChange(this, 'q5-group')">
          <span>Probably yes</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="q5" value="Not sure" onchange="onRadioChange(this, 'q5-group')">
          <span>Not sure</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="q5" value="Probably not" onchange="onRadioChange(this, 'q5-group')">
          <span>Probably not</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="q5" value="No" onchange="onRadioChange(this, 'q5-group')">
          <span>No</span>
        </label>
      </div>
    </div>

    <hr class="divider">

    <!-- Q6 -->
    <div class="question">
      <label class="question-label">Did this replace something you normally do, or was it extra?</label>
      <div class="radio-group" id="q6-group">
        <label class="radio-option">
          <input type="radio" name="q6" value="Replaced something I normally do" onchange="onRadioChange(this, 'q6-group')">
          <span>Replaced something I normally do</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="q6" value="Was an additional step" onchange="onRadioChange(this, 'q6-group')">
          <span>Was an additional step</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="q6" value="Not sure" onchange="onRadioChange(this, 'q6-group')">
          <span>Not sure</span>
        </label>
      </div>
    </div>

    <hr class="divider">

    <!-- Q7 -->
    <div class="question">
      <label class="question-label" for="q7">One sentence — what was the most valuable part of the filing?</label>
      <input type="text" id="q7" name="q7" placeholder="The most valuable part was..." oninput="checkRequired()">
    </div>

    <hr class="divider">

    <!-- Q8 -->
    <div class="question">
      <label class="question-label" for="q8">Anything else you want to tell us? <span class="optional-tag">(optional)</span></label>
      <textarea id="q8" name="q8" rows="3" placeholder="Optional. Leave blank if nothing comes to mind."></textarea>
    </div>

    <button type="submit" class="submit-btn" id="submit-btn" disabled>Submit</button>

  </form>

  <div class="success" id="success-state">
    <p>Thanks — this is really helpful.</p>
  </div>

</div>
<script>
  const ENDPOINT = 'https://script.google.com/a/macros/andrewmarkconstruction.com/s/AKfycbyUG1oF066RBG3kbDK4x2xhD_s_P_T37Pz4Wlk5kJR1ivY7bESKFkEoiHtPTSOWdvsd9w/exec';

  const params = new URLSearchParams(window.location.search);

  function onRadioChange(radio, groupId) {
    document.querySelectorAll('#' + groupId + ' .radio-option').forEach(el => el.classList.remove('selected'));
    radio.closest('.radio-option').classList.add('selected');
    checkRequired();
  }

  function toggleOther(radio) {
    const wrap = document.getElementById('q3-other-wrap');
    if (radio.value === 'Other') {
      wrap.classList.add('visible');
    } else {
      wrap.classList.remove('visible');
    }
  }

  function checkRequired() {
    const q1 = document.querySelector('input[name="q1"]:checked');
    const q2 = document.getElementById('q2').value.trim();
    const q3 = document.querySelector('input[name="q3"]:checked');
    const q3IsOther = q3 && q3.value === 'Other';
    const q3OtherText = document.getElementById('q3_other_text').value.trim();
    const q5 = document.querySelector('input[name="q5"]:checked');
    const q6 = document.querySelector('input[name="q6"]:checked');
    const q7 = document.getElementById('q7').value.trim();

    const allFilled = q1 && q2 && q3 && (!q3IsOther || q3OtherText) && q5 && q6 && q7;
    document.getElementById('submit-btn').disabled = !allFilled;
  }

  document.getElementById('feedback-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    const q3Val = document.querySelector('input[name="q3"]:checked')?.value || '';

    const formData = {
      timestamp: new Date().toISOString(),
      job_id: params.get('job_id') || '',
      framing_version: params.get('framing_version') || '',
      sender_role: params.get('sender_role') || '',
      q1_filing_complete: document.querySelector('input[name="q1"]:checked')?.value || '',
      q2_comparison_noticed: document.getElementById('q2').value.trim(),
      q3_after_comparison: q3Val,
      q3_other_text: q3Val === 'Other' ? document.getElementById('q3_other_text').value.trim() : '',
      q4_confusing: document.getElementById('q4').value.trim(),
      q5_file_again: document.querySelector('input[name="q5"]:checked')?.value || '',
      q6_replace_or_extra: document.querySelector('input[name="q6"]:checked')?.value || '',
      q7_most_valuable: document.getElementById('q7').value.trim(),
      q8_additional: document.getElementById('q8').value.trim()
    };

    fetch(ENDPOINT, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    });

    setTimeout(function() {
      document.getElementById('feedback-form').style.display = 'none';
      document.getElementById('success-state').style.display = 'block';
    }, 1000);
  });
</script>
</body>
</html>
