name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci --prefer-offline || npm install

      - name: Build Next.js app
        working-directory: app
        run: npm run build

      - name: Copy static HTML files into build output
        run: |
          cp feedback.html app/out/feedback.html
          cp stipum_landing.html app/out/stipum_landing.html
          cp robots.txt app/out/robots.txt
          cp .nojekyll app/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
