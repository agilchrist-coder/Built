name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: app
        run: npm install --legacy-peer-deps

      - name: Build Next.js app
        working-directory: app
        env:
          NEXT_PUBLIC_BASE44_URL: https://blind-fold-sync.base44.app
        run: npm run build

      - name: Assemble deployment directory
        run: |
          mkdir -p _site/app
          cp -r app/out/. _site/app/
          cp feedback.html _site/feedback.html
          cp stipum_landing.html _site/stipum_landing.html
          cp robots.txt _site/robots.txt
          touch _site/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
